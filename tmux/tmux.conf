# vim:fileencoding=utf-8:foldmethod=marker
# idol: https://github.com/samoshkin/tmux-config

source-file ~/.dotfiles/tmux/.tmux.reset.conf

# General settings {{{
# =============================================================================

# Terminal settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

setw -g xterm-keys on
set -s escape-time 10         # faster command sequences
set -sg repeat-time 600       # increase repeat timeout
set -s focus-events on

# Time tracking: record pane focus changes for project attribution
set-hook -ga pane-focus-in 'run-shell -b "~/.claude/hooks/focus-tracker.sh \"#{pane_current_path}\""'

set -q -g status-utf8 on      # expect UTF-8 (tmux < 2.2)
setw -q -g utf8 on

set -g history-limit 50000    # boost history
set -g renumber-windows on    # renumber window after close
set -g prefix C-s             # change prefix
set -g mouse on               # Enable mouse support

# Which-key: Prefix + ? shows all available bindings
# (Space binding removed — ? is the universal help key)

# Bell and notification settings
set -g bell-action any
set -g visual-bell off

# }}}

# Display {{{
# =============================================================================

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g automatic-rename-format '#{b:pane_current_path}'

set -g set-titles on          # set terminal title

set -g display-panes-time 3000 # longer pane indicators display time (3s)
set -g display-time 1000      # slightly longer status messages display time

# status-interval set in custom-status.conf (5s)

set -g default-command "ZDOTDIR=$HOME/.dotfiles/zsh zsh"

# }}}

# Floating popup {{{
# =============================================================================


# Which-key: Prefix + ? (alias for Prefix + Space — universal help key)
bind-key ? run-shell "bash ~/.dotfiles/tmux/scripts/tmux-which-key.sh"

# Custom unified status bar configuration
source-file ~/.dotfiles/tmux/custom-status.conf

# }}}

# Key bindings {{{
# =============================================================================

# create session (also available via session manager: Prefix + o)
# bind C-c new-session

# create new window in current directory
bind c new-window -c "#{pane_current_path}"

# resize panes like vim
bind-key -r Left resize-pane -L 5
bind-key -r Down resize-pane -D 5
bind-key -r Up resize-pane -U 5
bind-key -r Right resize-pane -R 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -fv

# Zoom pane
bind z resize-pane -Z

# Kill pane/window/session shortcuts (with immediate save to prevent unwanted restore)
bind x kill-pane \; run-shell "~/.dotfiles/tmux/plugins/tmux-resurrect/scripts/save.sh >/dev/null 2>&1 || true"
bind X kill-window \; run-shell "~/.dotfiles/tmux/plugins/tmux-resurrect/scripts/save.sh >/dev/null 2>&1 || true"
bind Q confirm-before -p "kill-session #S? (y/n)" 'kill-session \; run-shell "~/.dotfiles/tmux/plugins/tmux-resurrect/scripts/save.sh >/dev/null 2>&1 || true"'

# Move windows
#https://superuser.com/questions/343572/how-do-i-reorder-tmux-windows#answer-552493
bind-key -n C-S-Left swap-window -t -1 \;\
  select-window -t -1
bind-key -n C-S-Right swap-window -t +1 \;\
  select-window -t +1

# bind "r" source-file ~/.tmux.conf \; display-message "~/.tmux.conf sourced"
# bind r unbind-key -a \; source-file ~/.tmux/.tmux.reset.conf \; source-file ~/.tmux.conf \; display "Config reloaded"
bind r source-file ~/.dotfiles/tmux/tmux.conf \; display-message "Config reloaded!"

# Source: https://waylonwalker.com/til/tmux-copy-mode-binding/
bind Enter copy-mode
bind -n C-[ copy-mode

# break pane out of window
bind-key B break-pane -d

# put pane back into window
bind-key E command-prompt -p "join pane from: " "join-pane -h -s '%%'"

# Apps key table - press 'a' to enter, then select app
# lowercase = new window, UPPERCASE = popup overlay
bind-key a switch-client -T apps

# Apps table: window variants (lowercase)
bind-key -T apps g new-window -n lazygit -c "#{pane_current_path}" "lazygit"
bind-key -T apps y new-window -n yazi -c "#{pane_current_path}" "yazi"
bind-key -T apps b new-window -n btop "btop"
bind-key -T apps m new-window -n glow -c "#{pane_current_path}" "glow"

# Apps table: popup variants (UPPERCASE)
bind-key -T apps G display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind-key -T apps Y display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "yazi"
bind-key -T apps B display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "btop"
bind-key -T apps M display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "glow"

# Apps table: cancel
bind-key -T apps Escape switch-client -T prefix

# Pane management key table - press 'v' to enter, then select action
bind-key v switch-client -T panes

# Pane table: layouts
bind-key -T panes = select-layout -E \; display-message "Layout: balanced" \; switch-client -T prefix
bind-key -T panes t select-layout tiled \; display-message "Layout: tiled (auto grid)" \; switch-client -T prefix
bind-key -T panes m select-layout main-vertical \; display-message "Layout: main-vertical" \; switch-client -T prefix
bind-key -T panes M select-layout main-horizontal \; display-message "Layout: main-horizontal" \; switch-client -T prefix
bind-key -T panes 1 run-shell "bash ~/.dotfiles/tmux/scripts/tmux-grid-layout.sh 1" \; display-message "Layout: max 1 row" \; switch-client -T prefix
bind-key -T panes 2 run-shell "bash ~/.dotfiles/tmux/scripts/tmux-grid-layout.sh 2" \; display-message "Layout: max 2 rows" \; switch-client -T prefix
bind-key -T panes 3 run-shell "bash ~/.dotfiles/tmux/scripts/tmux-grid-layout.sh 3" \; display-message "Layout: max 3 rows" \; switch-client -T prefix

# Pane table: split
bind-key -T panes | split-window -h -c "#{pane_current_path}" \; switch-client -T prefix
bind-key -T panes - split-window -v -c "#{pane_current_path}" \; switch-client -T prefix
bind-key -T panes _ split-window -fv \; switch-client -T prefix

# Pane table: structure
bind-key -T panes j choose-tree -Z "join-pane -h -s '%%'" \; switch-client -T prefix
bind-key -T panes b break-pane -d \; display-message "Pane broken out" \; switch-client -T prefix

# Pane table: grab (fzf popup)
bind-key -T panes g display-popup -E -w 80% -h 60% "bash ~/.dotfiles/tmux/scripts/tmux-grab-pane.sh h"
bind-key -T panes G display-popup -E -w 80% -h 60% "bash ~/.dotfiles/tmux/scripts/tmux-grab-pane.sh v"

# Pane table: swap
bind-key -T panes h swap-pane -U \; switch-client -T prefix
bind-key -T panes l swap-pane -D \; switch-client -T prefix
bind-key -T panes s display-panes "swap-pane -t '%%'" \; switch-client -T prefix

# Pane table: manage
bind-key -T panes x kill-pane \; run-shell "~/.dotfiles/tmux/plugins/tmux-resurrect/scripts/save.sh >/dev/null 2>&1 || true"
bind-key -T panes z resize-pane -Z \; switch-client -T prefix
bind-key -T panes r rotate-window \; switch-client -T prefix

# Pane table: cancel
bind-key -T panes Escape switch-client -T prefix

# Open project URLs with lit-info (only if li-tools is available)
if-shell '[ -d "$HOME/repos/li-tools" ]' \
    'bind-key U run-shell -b "tmux display-popup -d \"#{pane_current_path}\" -xC -yC -w80% -h60% -E \"bash ~/.dotfiles/tmux/scripts/lit-info-urls.sh \\\"#{pane_current_path}\\\"\""'

# }}}

# Copy mode, scroll and clipboard {{{
# =============================================================================

## Prefer vi style key table
setw -g mode-keys vi

# Disable tmux's built-in clipboard to force all operations through rclip
set -s set-clipboard off

# Set rclip as the global copy command for tmux 3.2+
set -s copy-command 'rclip'

# Use rclip for all clipboard operations - it handles local/remote automatically
# Copy selected text with rclip
unbind-key -T copy-mode-vi v
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode-vi 'Y' send -X select-line \; send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'rclip'

# Enhanced vim-like copy mode features
bind -T copy-mode-vi 'V' send -X select-line                  # Visual line mode (select entire lines)
bind -T copy-mode-vi 'o' send -X other-end                    # Switch selection ends
bind -T copy-mode-vi 'C-c' send -X cancel                     # Alternative escape key
# Note: 'g' already goes to top, 'G' goes to bottom (from defaults)
# Note: Can't bind multi-character sequences like 'gg' or 'zz' in tmux

# Fix problematic vi copy mode bindings
bind -T copy-mode-vi 'C-j' send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode-vi 'A' send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode-vi 'D' send -X begin-selection \; send -X end-of-line \; send -X copy-pipe-and-cancel 'rclip'

# Enhanced mouse behavior - prevent copy mode exit on drag end
unbind -T copy-mode-vi MouseDragEnd1Pane                           # Don't exit copy mode on drag end
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection      # Copy without cancelling copy mode

# Fix mouse drag in copy mode - override root binding to always stay in tmux copy mode
bind -T copy-mode-vi MouseDrag1Pane select-pane \; send -X begin-selection

# Mouse selection bindings that automatically copy via rclip
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-and-cancel 'rclip'

# Emacs copy mode bindings (for completeness)
bind -T copy-mode 'M-w' send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode 'C-w' send -X copy-pipe-and-cancel 'rclip' 
bind -T copy-mode 'C-k' send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode MouseDrag1Pane select-pane \; send -X begin-selection
bind -T copy-mode DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-and-cancel 'rclip'
bind -T copy-mode TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-and-cancel 'rclip'

# Root table mouse bindings that automatically copy via rclip
# Override default double/triple-click to use rclip explicitly
bind -T root DoubleClick1Pane select-pane \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-word ; send-keys -X copy-pipe-and-cancel 'rclip' }
bind -T root TripleClick1Pane select-pane \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-line ; send-keys -X copy-pipe-and-cancel 'rclip' }

# }}}

# Plugins {{{
# =============================================================================

# Disable TPM default keybindings (we use a custom key table instead)
set -g @tpm-install "none"
set -g @tpm-update "none"
set -g @tpm-clean "none"

# TPM key table - press 't' to enter, then select action
bind-key t switch-client -T tpm
bind-key -T tpm i run-shell ~/.dotfiles/tmux/plugins/tpm/bindings/install_plugins
bind-key -T tpm u run-shell ~/.dotfiles/tmux/plugins/tpm/bindings/update_plugins
bind-key -T tpm x run-shell ~/.dotfiles/tmux/plugins/tpm/bindings/clean_plugins
bind-key -T tpm Escape switch-client -T prefix

# https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tpm'

# set -g @plugin 'graemedavidson/tmux-pane-focus'
# set -g @plugin 'graemedavidson/tmux-pane-focus#tag'
# set -g @pane-focus-size on
# set -g @pane-focus-size '80'
# set -g @pane-focus-direction '+'

# Removed: catppuccin/tmux - replaced with custom status bar

set -g pane-active-border-style 'fg=#45475a,bg=#45475a'
set -g pane-border-style 'fg=#313244'

# Removed catppuccin_flavour - using custom status colors
# Removed catppuccin_status_background

# Status position moved to custom-status.conf


# https://github.com/christoomey/vim-tmux-navigator
# set -g @plugin 'christoomey/vim-tmux-navigator'

# Smart pane switching with awareness of vim and fzf
forward_programs="view|n?vim?|fzf"

should_forward="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?($forward_programs)(diff)?$'"

bind -n C-h if-shell "$should_forward" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$should_forward" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$should_forward" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$should_forward" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$should_forward" "send-keys C-\\" "select-pane -l"

# tmux-resurrect (save & restore sessions, windows, panes)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir "$HOME/.dotfiles/tmux/resurrect"
set -g @resurrect-processes 'ssh vi vim nvim man tail top htop "claude->claude -c --dangerously-skip-permissions"'
set -g @resurrect-capture-pane-contents 'on'

# tmux-continuum (auto-save & auto-restore)
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'          # restore last session on tmux start
set -g @continuum-save-interval '15'     # auto-save every 15 minutes

# Resurrect cleanup: keep only last 50 saves (prevents unbounded growth)
set -g @resurrect-hook-post-save-all 'ls -t ~/.dotfiles/tmux/resurrect/tmux_resurrect_*.txt 2>/dev/null | tail -n +51 | xargs rm -f 2>/dev/null || true'

# Save session state when a session closes (e.g., user types 'exit' in last pane)
# This prevents "ghost sessions" from being restored by continuum.
# On server restart/crash, tmux is killed and no hooks fire, so the save file
# is preserved and sessions restore correctly.
set-hook -g session-closed 'run-shell "~/.dotfiles/tmux/plugins/tmux-resurrect/scripts/save.sh >/dev/null 2>&1 || true"'

# Custom session manager (replaces tmux-sessionx)
bind-key o run-shell -b "bash ~/.dotfiles/tmux/scripts/tmux-session-manager.sh"

# https://github.com/omerxx/tmux-floax
set -g @plugin 'omerxx/tmux-floax'



# A tmux plugin for opening urls from browser quickly without mouse.
# Doc: https://github.com/wfxr/tmux-fzf-url
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind 'u'
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-open 'ropen'

# Doc: https://github.com/tmux-plugins/tmux-prefix-highlight
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Fuzzy text extraction from pane content (paths, hashes, words)
# Doc: https://github.com/laktak/extrakto
set -g @plugin 'laktak/extrakto'
set -g @extrakto_clip_tool 'rclip'
set -g @extrakto_open_tool 'ropen'
set -g @extrakto_copy_key 'tab'
set -g @extrakto_insert_key 'enter'
set -g @extrakto_fzf_layout 'reverse'

# Vimium-style hint copy — highlights patterns, press letter to copy
# Doc: https://github.com/fcsonline/tmux-thumbs
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key F
set -g @thumbs-command 'echo -n {} | rclip && tmux display-message "Copied: {}"'
set -g @thumbs-upcase-command 'echo -n {} | rclip && ropen {} && tmux display-message "Opened: {}"'

# Fuzzy scrollback buffer search with fzf preview
# Doc: https://github.com/roosta/tmux-fuzzback
set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind /
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '90%'

# One-key process kill for hung processes
# Doc: https://github.com/tmux-plugins/tmux-cowboy
set -g @plugin 'tmux-plugins/tmux-cowboy'

# Claude session browser - Prefix+g to browse/resume Claude conversations
# Doc: https://github.com/aomerk/tmux-claude-sessions
set -g @plugin 'aomerk/tmux-claude-sessions'

# }}}

# Nesting local and remote sessions {{{
# =============================================================================

# Session is considered to be remote when we ssh into host
if-shell 'test -n "$SSH_CLIENT"' 'source-file ~/.dotfiles/tmux/tmux.remote.conf'

# Enhanced nested session handling with clipboard integration
# See: toggle on/off all keybindings · Issue #237 · tmux/tmux - https://github.com/tmux/tmux/issues/237

# Toggle nested session mode - disables outer tmux to access inner tmux
bind -T root C-] \
    set prefix none \;\
    set key-table off \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    set status-bg colour24 \;\
    refresh-client -S \;\
    display-message "Nested session mode ON - outer tmux disabled"

bind -T off C-] \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-bg \;\
  refresh-client -S \;\
  display-message "Nested session mode OFF - outer tmux enabled"

# Smart copy binding that works everywhere (local, remote, nested sessions)
# rclip handles all environments and falls back to OSC52 when needed
bind -T copy-mode-vi 'C-y' send -X copy-pipe-and-cancel 'rclip'

# }}}

# Plugins Manager {{{
# =============================================================================

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.dotfiles/tmux/plugins/"

if "test ! -d ~/.dotfiles/tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.dotfiles/tmux/plugins/tpm && \
      ~/.dotfiles/tmux/plugins/tpm/bin/install_plugins'"

# Run all plugins' scripts
run -b '~/.dotfiles/tmux/plugins/tpm/tpm'

# }}}
