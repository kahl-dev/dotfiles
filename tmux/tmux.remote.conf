set -g status-position bottom

set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID \
                             SSH_CONNECTION WINDOWID XAUTHORITY"

# SSH agent socket — constant path forwarded by the sm tunnel from the Mac.
# No discovery, no refresh hooks: a fixed path never goes stale across
# reconnects.
set-environment -g 'SSH_AUTH_SOCK' $HOME/.ssh/agent-tunnel.sock

# Disable update indicator on remote (tools typically not installed)
set -g @show-update-check "off"

