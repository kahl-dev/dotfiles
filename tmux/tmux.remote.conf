# Allow clipboard with OSC-52 work, see https://github.com/tmux/tmux/wiki/Clipboard
set -s set-clipboard on

set -g status-position bottom

set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID \
                             SSH_CONNECTION WINDOWID XAUTHORITY"

# Use dynamic SSH agent socket maintained by ssh-agent-keeper
set-environment -g 'SSH_AUTH_SOCK' $HOME/.ssh/ssh_auth_sock

# Hooks to refresh SSH agent on session events. `run-shell -b` runs in the
# background so tmux never blocks on the probe (see bin/ssh-agent-find-socket).
set-hook -g session-created 'run-shell -b "$HOME/.dotfiles/bin/ssh-agent-find-socket --quiet"'
set-hook -g client-attached 'run-shell -b "$HOME/.dotfiles/bin/ssh-agent-find-socket --quiet"'

# Disable update indicator on remote (tools typically not installed)
set -g @show-update-check "off"

# Manual refresh: scan sockets, repoint symlink, update tmux env. Must use -b
# (background) because the helper's ssh-add probes are bounded at 1s each but
# a synchronous run-shell would still freeze the client while they run.
bind-key R run-shell -b "$HOME/.dotfiles/bin/ssh-agent-find-socket"

