# Remote Bridge Default Configuration
# Copy this to ~/.config/remote-bridge/config.yaml and customize

service:
  port: 8377
  logLevel: info

# Notification rules - matched in order
notifications:
  rules:
    # Claude Code hook notifications (types sent by idle-notify.sh)
    - type: "claude-idle_prompt"
      sound: "Glass"
    - type: "claude-permission_prompt"
      sound: "Ping"
    # Generic error convention (rnotify --type error)
    - type: "error"
      sound: "Basso"
  defaultSound: "Pop"

# Rate limiting configuration
rateLimit:
  windowMs: 60000      # 1 minute window
  maxRequests: 60      # Max total requests per window

# Logging configuration
logging:
  level: info
  file: ~/.local/share/remote-bridge/activity.log
  maxSize: 10MB
  maxFiles: 5

# Plugin configuration
plugins:
  enabled: []  # Add plugin names here, e.g., ["claude-handler", "screenshot-processor"]
  
  # Plugin-specific settings
  settings:
    # Example plugin settings
    # claude-handler:
    #   logPath: ~/.local/share/claude-hooks.log
    #   alertOnError: true