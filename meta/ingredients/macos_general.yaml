- defaults:
    link:
      relink: true
      force: true
      relative: false

- clean: ['~']

- create:
    - ~/.config

- link:
    ~/.icloud: ~/Library/Mobile Documents/com~apple~CloudDocs/

    ~/.config/wezterm: ./.config/wezterm/
    ~/.config/karabiner: ./.config/karabiner/
    ~/.config/aerospace: ./.config/aerospace/
    ~/.config/ghostty: ./.config/ghostty/
    ~/.config/borders: ./.config/borders/

    ~/.hammerspoon: ./.hammerspoon/

    ~/Library/LaunchAgents/com.kahl_dev.add_ssh.plist: ./Library/LaunchAgents/com.kahl_dev.add_ssh.plist
    ~/Library/LaunchAgents/com.kahl-dev.borders.plist: ./Library/LaunchAgents/com.kahl-dev.borders.plist

- shell:
    - command: ./scripts/setup_homebrew.zsh
      stdout: true
      stdin: true
      stderr: true
