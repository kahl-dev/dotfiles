- shell:
    - description: "Install or update lazygit"
      command: |
        if command -v go &> /dev/null; then
          echo "📦 Installing lazygit via go install..."
          go install github.com/jesseduffield/lazygit@latest
          echo "✓ lazygit ready"
        else
          echo "⚠️  Go not available — install Go via mise first, then re-run"
          echo "   Run: mise install go@latest"
          exit 0
        fi
