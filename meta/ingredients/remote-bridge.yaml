# Remote Bridge - SSH tunnel communication system

- link:
    # Configuration
    ~/.config/remote-bridge: .config/remote-bridge

- shell:
    - description: Installing Remote Bridge dependencies
      command: cd remote-bridge && pnpm install --silent
      stdin: false
      stdout: true
      stderr: true
    
    - description: Setting up Remote Bridge service
      command: |
        if [[ "$(uname)" == "Darwin" ]]; then
          # `install` only (re)writes the plist to disk — it never calls
          # launchctl, so it's safe to re-run on every provisioning even
          # while the service is already loaded and running. This is what
          # picks up plist changes (node path, ThrottleInterval, etc.)
          # across reprovisions instead of only on first install.
          already_running=false
          launchctl list | grep -q "com.kahl-dev.remote-bridge" && already_running=true

          ./remote-bridge/bin/remote-bridge install

          if [[ "$already_running" == "true" ]]; then
            echo "Remote Bridge service plist regenerated. Run 'remote-bridge restart' to apply changes to the running service."
          else
            echo "Remote Bridge service installed. Run 'remote-bridge start' to activate."
          fi
        else
          echo "Remote Bridge service is macOS only. CLI tools are available."
        fi
      stdin: false
      stdout: true
      stderr: true