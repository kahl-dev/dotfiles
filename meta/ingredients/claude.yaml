- defaults:
    link:
      relink: true
      create: true
      force: true
    shell:
      quiet: false
      stderr: true

- clean: []

- shell:
    - description: "Clone or update Claude private configuration repository"
      command: |
        REPO_DIR="$HOME/repos/claude-config"
        REPO_URL="git@github.com:kahl-dev/claude-config.git"

        if [ ! -d "$REPO_DIR" ]; then
          echo "📦 Cloning Claude configuration repository..."
          if ! git clone "$REPO_URL" "$REPO_DIR"; then
            echo "❌ ERROR: Failed to clone Claude config repository"
            echo "   Ensure you have access to: $REPO_URL"
            echo "   and your SSH key is configured for GitHub"
            exit 1
          fi
          echo "✓ Claude configuration cloned successfully"
        else
          echo "🔄 Updating Claude configuration repository..."
          if ! git -C "$REPO_DIR" pull; then
            echo "⚠️  Warning: Failed to pull updates, using local version"
          else
            echo "✓ Claude configuration updated successfully"
          fi
        fi

    - description: "Clean up legacy Claude Code CLI installations (npm/brew)"
      command: |
        FOUND_LEGACY=false

        # 🧹 Remove Claude Code from all fnm node versions
        FNM_DIR="$HOME/.local/share/fnm/node-versions"
        if [ -d "$FNM_DIR" ]; then
          setopt NULL_GLOB 2>/dev/null || true
          for node_bin in "$FNM_DIR"/*/installation/bin/claude; do
            [ -e "$node_bin" ] || continue
            if [ -f "$node_bin" ]; then
              NODE_DIR="$(dirname "$node_bin")"
              NPM="$NODE_DIR/npm"
              if [ -x "$NPM" ]; then
                echo "🧹 Removing Claude Code from fnm: $NODE_DIR"
                "$NPM" uninstall -g @anthropic-ai/claude-code 2>/dev/null
                FOUND_LEGACY=true
              fi
            fi
          done
        fi

        # 🧹 Remove Claude Code from Homebrew
        if command -v brew >/dev/null 2>&1; then
          if brew list claude-code >/dev/null 2>&1; then
            echo "🧹 Removing Claude Code from Homebrew..."
            brew uninstall claude-code
            FOUND_LEGACY=true
          fi
        fi

        if [ "$FOUND_LEGACY" = true ]; then
          echo "✓ Legacy Claude Code installations removed"
        else
          echo "✓ No legacy Claude Code installations found"
        fi

    - description: "Install Claude Code CLI via native installer"
      command: |
        if [ -x "$HOME/.local/bin/claude" ]; then
          echo "✓ Claude Code CLI already installed at ~/.local/bin/claude"
          "$HOME/.local/bin/claude" --version 2>/dev/null || true
        else
          echo "📦 Installing Claude Code CLI..."
          curl -fsSL https://claude.ai/install.sh | bash
          if [ -x "$HOME/.local/bin/claude" ]; then
            echo "✓ Claude Code CLI installed successfully"
            "$HOME/.local/bin/claude" --version 2>/dev/null || true
          else
            echo "❌ ERROR: Claude Code CLI installation failed"
            exit 1
          fi
        fi

    - description: "Clean up legacy RTK installations (brew/sudo/manual)"
      command: |
        CLEANED=false
        if command -v brew >/dev/null 2>&1 && brew list rtk-ai/tap/rtk >/dev/null 2>&1; then
          echo "🧹 Removing RTK from Homebrew..."
          brew uninstall rtk-ai/tap/rtk
          CLEANED=true
        fi
        if [ -f "/usr/local/bin/rtk" ]; then
          echo "🧹 Removing legacy RTK from /usr/local/bin (requires sudo)..."
          sudo rm -f /usr/local/bin/rtk
          CLEANED=true
        fi
        if [ -f "$HOME/.local/bin/rtk" ]; then
          echo "🧹 Removing legacy RTK from ~/.local/bin..."
          rm -f "$HOME/.local/bin/rtk"
          CLEANED=true
        fi
        if [ "$CLEANED" = true ]; then
          echo "✓ Legacy RTK installations removed"
        else
          echo "✓ No legacy RTK installations found"
        fi

    - description: "Install or update RTK (Rust Token Killer) via cargo"
      command: |
        eval "$(mise env -s bash rust)" 2>/dev/null

        if ! command -v cargo >/dev/null 2>&1; then
          echo "⚠️  Rust/cargo not available (add rust to mise config), skipping RTK"
          exit 0
        fi

        LATEST=$(curl -fsSL https://api.github.com/repos/rtk-ai/rtk/releases/latest | grep -o '"tag_name": *"[^"]*"' | head -1 | sed 's/.*"tag_name": *"//;s/"//;s/^v//')
        CURRENT=$(rtk --version 2>/dev/null | grep -o '[0-9]*\.[0-9]*\.[0-9]*' || echo "none")

        if [ "$CURRENT" = "$LATEST" ]; then
          echo "✓ RTK already up to date ($CURRENT)"
        else
          echo "📦 Building RTK $LATEST from source (current: $CURRENT)..."
          cargo install --git https://github.com/rtk-ai/rtk --quiet
          echo "✓ RTK installed ($(rtk --version 2>/dev/null))"
        fi

    - description: "Symlink RTK config to dotfiles (cross-platform)"
      command: |
        DOTFILES_RTK="$HOME/.dotfiles/.config/rtk"
        if [ ! -d "$DOTFILES_RTK" ]; then
          echo "⚠️  RTK dotfiles config not found at $DOTFILES_RTK, skipping"
          exit 0
        fi

        # Detect OS-native RTK config location
        case "$(uname -s)" in
          Darwin) RTK_CONFIG="$HOME/Library/Application Support/rtk" ;;
          *)      RTK_CONFIG="${XDG_CONFIG_HOME:-$HOME/.config}/rtk" ;;
        esac

        # Skip if already correctly linked
        if [ -L "$RTK_CONFIG" ] && [ "$(readlink "$RTK_CONFIG")" = "$DOTFILES_RTK" ]; then
          echo "✓ RTK config already linked"
          exit 0
        fi

        # Move existing config files into dotfiles if not symlinked
        if [ -d "$RTK_CONFIG" ] && [ ! -L "$RTK_CONFIG" ]; then
          echo "🔄 Migrating existing RTK config to dotfiles..."
          cp -n "$RTK_CONFIG"/* "$DOTFILES_RTK/" 2>/dev/null || true
          rm -rf "$RTK_CONFIG"
        fi

        mkdir -p "$(dirname "$RTK_CONFIG")"
        ln -sfn "$DOTFILES_RTK" "$RTK_CONFIG"
        echo "✓ RTK config linked: $RTK_CONFIG → $DOTFILES_RTK"

    - description: "Install or update codebase-memory-mcp (code knowledge graph)"
      command: |
        CBM="$HOME/.local/bin/codebase-memory-mcp"
        LATEST=$(curl -fsSL https://api.github.com/repos/DeusData/codebase-memory-mcp/releases/latest | grep -o '"tag_name": *"[^"]*"' | head -1 | sed 's/.*"tag_name": *"//;s/"//;s/^v//')
        CURRENT=$("$CBM" --version 2>/dev/null | grep -o '[0-9]*\.[0-9]*\.[0-9]*' || echo "none")

        if [ "$CURRENT" = "$LATEST" ]; then
          echo "✓ codebase-memory-mcp already up to date ($CURRENT)"
        else
          echo "📦 Installing codebase-memory-mcp $LATEST (current: $CURRENT)..."
          TMPSCRIPT=$(mktemp)
          curl -fsSL https://raw.githubusercontent.com/DeusData/codebase-memory-mcp/main/install.sh -o "$TMPSCRIPT"
          bash "$TMPSCRIPT" --skip-config
          rm -f "$TMPSCRIPT"
          echo "✓ codebase-memory-mcp installed ($("$CBM" --version 2>/dev/null))"
        fi

    - description: "Configure Claude Code MCP servers"
      command: |
        CLAUDE="$HOME/.local/bin/claude"
        if [ ! -x "$CLAUDE" ]; then
          echo "⚠️  Claude Code CLI not found, skipping MCP setup"
          exit 0
        fi

        # EXA — semantic web search + code context (neural, not keyword-based)
        # https://docs.exa.ai/reference/exa-mcp
        "$CLAUDE" mcp add --transport http -s user exa "https://mcp.exa.ai/mcp?tools=web_search_exa,get_code_context_exa"

        # codebase-memory-mcp — code knowledge graph (120x fewer tokens for exploration)
        # https://github.com/DeusData/codebase-memory-mcp
        if [ -x "$HOME/.local/bin/codebase-memory-mcp" ]; then
          "$CLAUDE" mcp add -s user codebase-memory-mcp -- "$HOME/.local/bin/codebase-memory-mcp"
        fi

        echo "✓ MCP servers configured"

    - description: "Create AI workspace directories for Claude"
      command: |
        mkdir -p ~/tmp/ai/screenshots \
                 ~/tmp/ai/jira \
                 ~/tmp/ai/exports \
                 ~/tmp/ai/figma \
                 ~/tmp/ai/downloads \
                 ~/tmp/ai/analysis \
                 ~/tmp/ai/cache

    - description: "Sync claude-config skills as individual symlinks"
      command: |
        SKILLS_SOURCE="$HOME/repos/claude-config/skills"
        SKILLS_TARGET="$HOME/.claude/skills"

        # 🔗 Remove directory symlink if it exists (migration from old setup)
        if [ -L "$SKILLS_TARGET" ]; then
          echo "🔄 Migrating skills from directory symlink to individual symlinks..."
          rm "$SKILLS_TARGET"
        fi

        mkdir -p "$SKILLS_TARGET"

        # 🔗 Link each claude-config skill individually
        linked=0
        for skill in "$SKILLS_SOURCE"/*/; do
          [ -d "$skill" ] || continue
          name=$(basename "${skill%/}")
          # Skip if already correctly linked
          current=$(readlink "$SKILLS_TARGET/$name" 2>/dev/null)
          [ "$current" = "$skill" ] && continue
          # Skip if managed by another source (e.g. skills.sh)
          if [ -L "$SKILLS_TARGET/$name" ] && [ -e "$SKILLS_TARGET/$name" ]; then
            case "$current" in
              *claude-config/skills*) ;; # Ours, safe to overwrite
              *) echo "⚠️  Skipping $name (managed externally)"; continue ;;
            esac
          fi
          ln -sfn "$skill" "$SKILLS_TARGET/$name"
          linked=$((linked + 1))
        done
        echo "✓ Linked $linked claude-config skill(s) to ~/.claude/skills/"

- link:
    ~/.claude/agents: ~/repos/claude-config/agents
    ~/.claude/commands: ~/repos/claude-config/commands
    ~/.claude/hooks: ~/repos/claude-config/hooks
    ~/.claude/output-styles: ~/repos/claude-config/output-styles
    ~/.claude/shared: ~/repos/claude-config/shared
    ~/.claude/settings.json: ~/repos/claude-config/settings.json
    ~/.claude/statusline.sh: ~/repos/claude-config/statusline.sh
    ~/.claude/CLAUDE.md: ~/repos/claude-config/GLOBAL.CLAUDE.md

