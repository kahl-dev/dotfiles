#:schema https://yazi-rs.github.io/schemas/yazi.json

# Only overrides live here — Yazi merges this over its built-in defaults.
# Do not vendor the full default preset: it goes stale and breaks on schema changes.

[mgr]
show_hidden  = true
mouse_events = [ "click", "scroll" ]
title_format = "Yazi: {cwd}"

# git.yazi — Git status as linemode (theme + require("git"):setup in init.lua)
[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
