# AeroSpace Configuration
# https://nikitabobko.github.io/AeroSpace/guide

# Config version for compatibility (v2 required for modern features)
config-version = 2

# Commands that run after AeroSpace startup
after-startup-command = []

# Start AeroSpace at login
start-at-login = true

# Normalizations
# See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Accordion padding (0 to disable)
accordion-padding = 30

# Default layout and orientation
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus on monitor change (lazy = only if cursor not already there)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Update border color based on floating/tiling state
on-focus-changed = ['exec-and-forget /bin/bash ~/.config/aerospace/borders-focus.sh']

# Disable macOS "Hide application" (cmd-h) workaround
automatically-unhide-macos-hidden-apps = false

# ╔══════════════════════════════════════════════════════════════╗
# ║  Window Detection Rules                                      ║
# ╚══════════════════════════════════════════════════════════════╝

# Floating apps — exact bundle IDs for precision
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating']

[[on-window-detected]]
if.app-name-regex-substring = 'elgato'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Settings'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.reminders'
run = ['layout floating']

# ╔══════════════════════════════════════════════════════════════╗
# ║  Key Mapping                                                  ║
# ╚══════════════════════════════════════════════════════════════╝

[key-mapping]
preset = 'qwerty'

# ╔══════════════════════════════════════════════════════════════╗
# ║  Gaps                                                         ║
# ╚══════════════════════════════════════════════════════════════╝

[gaps]
inner.horizontal = 20
inner.vertical = 20
outer.left = 20
outer.bottom = 20
outer.top = 20
outer.right = 20

# ╔══════════════════════════════════════════════════════════════╗
# ║  Main Binding Mode                                            ║
# ╚══════════════════════════════════════════════════════════════╝

[mode.main.binding]

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus (crosses monitors for vertical 2-monitor setup)
alt-h = 'focus --boundaries all-monitors-outer-frame left'
alt-j = 'focus --boundaries all-monitors-outer-frame down'
alt-k = 'focus --boundaries all-monitors-outer-frame up'
alt-l = 'focus --boundaries all-monitors-outer-frame right'

# Move window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Swap window position
alt-ctrl-h = 'swap left'
alt-ctrl-j = 'swap down'
alt-ctrl-k = 'swap up'
alt-ctrl-l = 'swap right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Window management
alt-q = 'close --quit-if-last-window'
alt-f = 'fullscreen'
alt-e = 'macos-native-fullscreen'
alt-semicolon = 'focus-back-and-forth'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-n = 'workspace next --wrap-around'
alt-p = 'workspace prev --wrap-around'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Workspace navigation
alt-tab = 'workspace-back-and-forth'

# Monitor management (hyper = caps-hold = ctrl+alt+shift+cmd)
ctrl-alt-shift-cmd-tab = 'move-workspace-to-monitor --wrap-around next'
ctrl-alt-shift-cmd-h = 'move-node-to-monitor --wrap-around left --focus-follows-window'
ctrl-alt-shift-cmd-l = 'move-node-to-monitor --wrap-around right --focus-follows-window'
ctrl-alt-shift-cmd-j = 'move-node-to-monitor --wrap-around down --focus-follows-window'
ctrl-alt-shift-cmd-k = 'move-node-to-monitor --wrap-around up --focus-follows-window'

# Modes
ctrl-alt-shift-cmd-semicolon = 'mode service'
ctrl-alt-shift-cmd-a = 'mode apps'

# Help overlays (? = universal help key)
alt-shift-slash = '''exec-and-forget /opt/homebrew/bin/hs -c "require('modules.aerospace-cheatsheet').toggle()"'''

# ╔══════════════════════════════════════════════════════════════╗
# ║  Workspace Monitor Assignment                                ║
# ╚══════════════════════════════════════════════════════════════╝

[workspace-to-monitor-force-assignment]
# Primary workspaces → LG HDR 4K (main work)
1 = ['LG HDR 4K', 'main']
2 = ['LG HDR 4K', 'main']
3 = ['LG HDR 4K', 'main']
4 = ['LG HDR 4K', 'main']
5 = ['LG HDR 4K', 'main']
# Secondary workspaces → LG Ultra HD (reference/docs)
6 = ['LG Ultra HD', 'secondary', 'main']
7 = ['LG Ultra HD', 'secondary', 'main']
# Tertiary workspaces → MacBook (chat/music/monitoring)
8 = ['Built-in Retina Display', 'secondary', 'main']
9 = ['Built-in Retina Display', 'secondary', 'main']

# ╔══════════════════════════════════════════════════════════════╗
# ║  Service Mode (hyper+;)                                       ║
# ╚══════════════════════════════════════════════════════════════╝

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
x = ['fullscreen', 'mode main'] # toggle fullscreen
f = ['layout floating tiling', 'mode main'] # toggle floating/tiling
b = ['balance-sizes', 'mode main'] # equalize window sizes
e = ['enable toggle', 'mode main'] # disable/enable AeroSpace
backspace = ['close-all-windows-but-current', 'mode main']

# Join with neighbor
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# ╔══════════════════════════════════════════════════════════════╗
# ║  Apps Mode (hyper+a)                                          ║
# ╚══════════════════════════════════════════════════════════════╝

[mode.apps.binding]
esc = ['mode main']
t = ['exec-and-forget open -a /Applications/Ghostty.app', 'mode main']
b = ['exec-and-forget open -a /Applications/Arc.app', 'mode main']
g = ['exec-and-forget open -a /Applications/ChatGPT.app', 'mode main']
m = ['exec-and-forget open -a /Applications/Microsoft Teams.app', 'mode main']
