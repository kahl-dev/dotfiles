# Remote Bridge Configuration

service:
  port: 8377
  logLevel: info

# Notification rules
notifications:
  rules:
    # Claude Code hook notifications (types sent by idle-notify.sh)
    - type: "claude-idle_prompt"
      sound: "Glass"
    - type: "claude-permission_prompt"
      sound: "Ping"
    # Generic error convention (rnotify --type error)
    - type: "error"
      sound: "Basso"
  defaultSound: "Pop"

# Rate limits
rateLimit:
  windowMs: 60000
  maxRequests: 60

# Logging
logging:
  level: info
  file: ~/.local/share/remote-bridge/activity.log
  maxSize: 10MB
  maxFiles: 5

# Plugins - uncomment to enable
plugins:
  enabled: ["obsidian"]
  # enabled: ["claude-handler"]